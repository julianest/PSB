# =============================================================================
# sonar-project.properties — Student Service
# =============================================================================
# Configuracion del analisis SonarCloud para el scanner CLI.
# Usado por SonarSource/sonarcloud-github-action en el pipeline de CI.
#
# IMPORTANTE: sonar.organization debe coincidir con la organizacion en
# SonarCloud (https://sonarcloud.io/organizations). Tipicamente es el
# nombre del usuario u organizacion de GitHub.
# =============================================================================

# Identificadores del proyecto (deben coincidir con build.gradle)
sonar.projectKey=bank-test
sonar.projectName=Scotiabank Reactive Challenge
sonar.projectVersion=1.0

# Organizacion en SonarCloud
# Verificar en: https://sonarcloud.io/organizations
sonar.organization=julianest

# Servidor
sonar.host.url=https://sonarcloud.io

# Fuentes y pruebas
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.sourceEncoding=UTF-8

# Binarios compilados (generados por ./gradlew test antes del analisis)
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test

# Reporte de cobertura JaCoCo (generado por ./gradlew jacocoTestReport)
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Exclusiones de cobertura (alineadas con jacocoTestReport en build.gradle)
sonar.coverage.exclusions=\
  **/config/**,\
  **/dto/**,\
  **/entity/**,\
  **/mapper/**,\
  **/*Application*

# Exclusiones de analisis (archivos generados automaticamente)
sonar.exclusions=\
  **/mapper/**/*MapperImpl.java,\
  build/**
